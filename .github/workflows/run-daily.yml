name: Daily BDR Scan

on:
  schedule:
    - cron: '0 8 * * *'  # Runs every day at 8 AM UTC
  workflow_dispatch:  # Also lets you manually trigger it

jobs:
  run-bdr-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Run BDR scan
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PODCASTINDEX_API_KEY: ${{ secrets.PODCASTINDEX_API_KEY }}
        run: python bdr_bot.py
      
      - name: Upload results to artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bdr-leads
          path: bdr_leads_*.json
